<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Base</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <h1>Knowledge Base</h1>
        <div>
            <span th:text="'Signed in as: ' + ${username}"></span>
            <a href="/admin/dashboard" class="logout-btn">Dashboard</a>
            <a href="/admin/users" class="logout-btn">Users</a>
            <a href="/admin/devices" class="logout-btn">Devices</a>
            <a href="/admin/device-reports" class="logout-btn">Device Reports</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <main class="content">
        <div class="card">
            <h2>Filter Articles</h2>

            <form th:action="@{/admin/knowledge}" method="get" class="filter-grid">
                <div>
                    <label for="deviceType">Device Type</label>
                    <select id="deviceType" name="deviceType">
                        <option value="">All</option>
                        <option th:each="device : ${deviceTypes}"
                                th:value="${device}"
                                th:text="${device}"
                                th:selected="${selectedDeviceType == device}">
                        </option>
                    </select>
                </div>

                <div>
                    <label for="issueCategory">Issue Category</label>
                    <select id="issueCategory" name="issueCategory">
                        <option value="">All</option>
                        <option th:each="issue : ${issueCategories}"
                                th:value="${issue}"
                                th:text="${issue}"
                                th:selected="${selectedIssueCategory == issue}">
                        </option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit">Apply Filters</button>
                    <a href="/admin/knowledge" class="secondary-link-btn">Clear</a>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Published Articles</h2>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Source Ticket</th>
                    <th>Device</th>
                    <th>Issue Category</th>
                    <th>Title</th>
                    <th>Published By</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="article : ${articles}">
                    <td th:text="${article.id}"></td>
                    <td th:text="${article.sourceTicketId}"></td>
                    <td th:text="${article.deviceType}"></td>
                    <td th:text="${article.issueCategory}"></td>
                    <td th:text="${article.title}"></td>
                    <td th:text="${article.publishedBy}"></td>
                    <td th:text="${article.createdAt}"></td>
                    <td>
                        <a th:href="@{'/admin/knowledge/' + ${article.id}}" class="table-link-btn">View</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(articles)}">
                    <td colspan="8">No knowledge articles found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>

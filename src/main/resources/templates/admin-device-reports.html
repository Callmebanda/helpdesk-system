<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Device Reports</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <h1>Device Reports</h1>
        <div>
            <span th:text="'Signed in as: ' + ${username}"></span>
            <a href="/admin/dashboard" class="logout-btn">Dashboard</a>
            <a href="/admin/devices" class="logout-btn">Devices</a>
            <a href="/admin/users" class="logout-btn">Users</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="card">
            <h2>Search and Filter Device Reports</h2>

            <form th:action="@{/admin/device-reports}" method="get" class="filter-grid">
                <div>
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="">All</option>
                        <option th:each="statusValue : ${reportStatuses}"
                                th:value="${statusValue}"
                                th:text="${statusValue}"
                                th:selected="${selectedStatus == statusValue}">
                        </option>
                    </select>
                </div>

                <div>
                    <label for="reportType">Report Type</label>
                    <select id="reportType" name="reportType">
                        <option value="">All</option>
                        <option th:each="type : ${reportTypes}"
                                th:value="${type}"
                                th:text="${type}"
                                th:selected="${selectedReportType == type}">
                        </option>
                    </select>
                </div>

                <div>
                    <label for="usernameFilter">Reported By Username</label>
                    <input id="usernameFilter"
                           name="usernameFilter"
                           type="text"
                           placeholder="e.g. user001"
                           th:value="${selectedUsernameFilter}">
                </div>

                <div>
                    <label for="assetNumber">Asset Number</label>
                    <input id="assetNumber"
                           name="assetNumber"
                           type="text"
                           placeholder="e.g. MOF-PC-001"
                           th:value="${selectedAssetNumber}">
                </div>

                <div>
                    <label for="department">Department</label>
                    <input id="department"
                           name="department"
                           type="text"
                           placeholder="e.g. Finance"
                           th:value="${selectedDepartment}">
                </div>

                <div>
                    <label for="size">Page Size</label>
                    <select id="size" name="size">
                        <option value="10" th:selected="${pageSize == 10}">10</option>
                        <option value="20" th:selected="${pageSize == 20}">20</option>
                        <option value="50" th:selected="${pageSize == 50}">50</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit">Apply Filters</button>
                    <a href="/admin/device-reports" class="secondary-link-btn">Clear</a>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Submitted Device Reports</h2>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Reported By</th>
                    <th>Department</th>
                    <th>Asset Number</th>
                    <th>Report Type</th>
                    <th>Description</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Review</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="report : ${reports}">
                    <td th:text="${report.id}"></td>
                    <td th:text="${report.reportedByFirstName + ' ' + report.reportedByLastName + ' (' + report.reportedByUsername + ')'}"></td>
                    <td th:text="${report.reportedByDepartment} ?: '-'"></td>
                    <td th:text="${report.assetNumber} ?: '-'"></td>
                    <td th:text="${report.reportType}"></td>
                    <td th:text="${report.description}"></td>
                    <td th:text="(${report.building} ?: '-') + ' / ' + (${report.officeNumber} ?: '-')"></td>
                    <td th:text="${report.status}"></td>
                    <td>
                        <form th:action="@{'/admin/device-reports/' + ${report.id} + '/review'}"
                              method="post"
                              class="form">

                            <select name="status" required>
                                <option th:each="statusValue : ${reportStatuses}"
                                        th:value="${statusValue}"
                                        th:text="${statusValue}"
                                        th:selected="${report.status == statusValue}">
                                </option>
                            </select>

                            <textarea name="reviewNote" rows="3"
                                      placeholder="Review note"
                                      th:text="${report.reviewNote}"></textarea>

                            <button type="submit" class="primary-small-btn">Save</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reports)}">
                    <td colspan="9">No device reports found.</td>
                </tr>
                </tbody>
            </table>
            <div class="pagination-bar" th:if="${totalPages > 1}">
                <a th:if="${hasPrevious}"
                   th:href="@{/admin/device-reports(
            page=${currentPage - 1},
            size=${pageSize},
            status=${selectedStatus},
            reportType=${selectedReportType},
            usernameFilter=${selectedUsernameFilter},
            assetNumber=${selectedAssetNumber},
            department=${selectedDepartment}
       )}"
                   class="secondary-link-btn">Previous</a>

                <span th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></span>

                <a th:if="${hasNext}"
                   th:href="@{/admin/device-reports(
            page=${currentPage + 1},
            size=${pageSize},
            status=${selectedStatus},
            reportType=${selectedReportType},
            usernameFilter=${selectedUsernameFilter},
            assetNumber=${selectedAssetNumber},
            department=${selectedDepartment}
       )}"
                   class="secondary-link-btn">Next</a>
            </div>

            <div class="pagination-info">
                <span th:text="'Total matching reports: ' + ${totalItems}"></span>
            </div>
        </div>
    </main>
</div>
</body>
</html>

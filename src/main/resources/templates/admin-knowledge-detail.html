<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Article Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <h1>Knowledge Article Detail</h1>
        <div>
            <span th:text="'Signed in as: ' + ${username}"></span>
            <a href="/admin/dashboard" class="logout-btn">Dashboard</a>
            <a href="/admin/users" class="logout-btn">Users</a>
            <a href="/admin/knowledge" class="logout-btn">Knowledge Base</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <main class="content">
        <div class="card">
            <h2 th:text="${article.title}"></h2>

            <div class="detail-grid">
                <div><strong>Article ID:</strong> <span th:text="${article.id}"></span></div>
                <div><strong>Source Ticket:</strong> <span th:text="${article.sourceTicketId}"></span></div>
                <div><strong>Device Type:</strong> <span th:text="${article.deviceType}"></span></div>
                <div><strong>Issue Category:</strong> <span th:text="${article.issueCategory}"></span></div>
                <div><strong>Published By:</strong> <span th:text="${article.publishedBy}"></span></div>
                <div><strong>Created At:</strong> <span th:text="${article.createdAt}"></span></div>
                <div><strong>Updated At:</strong> <span th:text="${article.updatedAt}"></span></div>
            </div>

            <div class="detail-block">
                <strong>Symptoms:</strong>
                <p th:text="${article.symptoms}"></p>
            </div>

            <div class="detail-block">
                <strong>Solution:</strong>
                <p th:text="${article.solution}"></p>
            </div>
        </div>
    </main>
</div>
</body>
</html>

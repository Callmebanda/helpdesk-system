<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Technician Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <h1>Technician Dashboard</h1>
        <div>
            <span th:text="'Signed in as: ' + ${username}"></span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <main class="content">
        <div class="summary-grid">
            <div class="card summary-card">
                <h3>Total Assigned</h3>
                <p th:text="${summary.totalAssigned}"></p>
            </div>
            <div class="card summary-card">
                <h3>Pending</h3>
                <p th:text="${summary.pending}"></p>
            </div>
            <div class="card summary-card">
                <h3>In Progress</h3>
                <p th:text="${summary.inProgress}"></p>
            </div>
            <div class="card summary-card">
                <h3>Resolved</h3>
                <p th:text="${summary.resolved}"></p>
            </div>
            <div class="card summary-card">
                <h3>Overdue</h3>
                <p th:text="${summary.overdue}"></p>
            </div>
        </div>

        <div class="card">
            <h2>Filter My Tickets</h2>

            <form th:action="@{/tech/dashboard}" method="get" class="filter-grid">
                <div>
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="">All</option>
                        <option th:each="statusValue : ${statuses}"
                                th:value="${statusValue}"
                                th:text="${statusValue}"
                                th:selected="${selectedStatus == statusValue}">
                        </option>
                    </select>
                </div>

                <div>
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="">All</option>
                        <option th:each="priorityValue : ${priorities}"
                                th:value="${priorityValue}"
                                th:text="${priorityValue}"
                                th:selected="${selectedPriority == priorityValue}">
                        </option>
                    </select>
                </div>

                <div>
                    <label for="overdue">Overdue</label>
                    <select id="overdue" name="overdue">
                        <option value="">All</option>
                        <option value="true" th:selected="${selectedOverdue == true}">Yes</option>
                        <option value="false" th:selected="${selectedOverdue == false}">No</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit">Apply Filters</button>
                    <a href="/tech/dashboard" class="secondary-link-btn">Clear</a>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Assigned Tickets</h2>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Department</th>
                    <th>Device</th>
                    <th>Issue</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Due At</th>
                    <th>Overdue</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ticket : ${tickets}">
                    <td th:text="${ticket.id}"></td>
                    <td th:text="${ticket.username}"></td>
                    <td th:text="${ticket.department}"></td>
                    <td th:text="${ticket.deviceType}"></td>
                    <td th:text="${ticket.problemTitle}"></td>
                    <td th:text="${ticket.status}"></td>
                    <td th:text="${ticket.priority}"></td>
                    <td th:text="${ticket.dueAt}"></td>
                    <td th:text="${ticket.overdue} ? 'Yes' : 'No'"></td>
                    <td>
                        <a th:href="@{'/tech/tickets/' + ${ticket.id}}" class="table-link-btn">View</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tickets)}">
                    <td colspan="10">No assigned tickets found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>

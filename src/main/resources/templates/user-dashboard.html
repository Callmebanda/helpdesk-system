<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <h1>User Dashboard</h1>
        <div>
            <span th:text="'Signed in as: ' + ${username}"></span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <main class="content">
        <div class="card">
            <div class="section-header">
                <h2>My Tickets</h2>
                <a href="/user/tickets/new" class="primary-link-btn">Create Ticket</a>
            </div>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Device</th>
                    <th>Issue</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Assigned To</th>
                    <th>Created</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ticket : ${tickets}">
                    <td th:text="${ticket.id}"></td>
                    <td th:text="${ticket.deviceType}"></td>
                    <td th:text="${ticket.problemTitle}"></td>
                    <td th:text="${ticket.status}"></td>
                    <td th:text="${ticket.priority}"></td>
                    <td th:text="${ticket.assignedTechnicianUsername} ?: 'Not assigned'"></td>
                    <td th:text="${ticket.createdAt}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(tickets)}">
                    <td colspan="7">No tickets found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
